<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Sequence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #e8f4fd;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
      text-align: center;
    }
    .client-name {
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: #2980b9;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      margin-top: 18px;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: white;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: #2980b9;
    }
    select.error, input.error {
      border-color: red;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #1f6391; }
    button[type="submit"]:disabled { background: #ccc; cursor: not-allowed; }
    .success {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .success .big-icon { font-size: 48px; margin-bottom: 16px; }
    .success h2 { color: #1a1a1a; margin-bottom: 8px; }
    .success p { color: #666; font-size: 15px; }
    .success .detail {
      margin-top: 16px;
      background: #e8f4fd;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: #2980b9;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="card">
  <div id="form-view">
    <div class="icon">🔄</div>
    <h1>Reset Sequence</h1>
    <div class="client-name" id="client-display"></div>

    <label for="sequenceStep">Restart from step</label>
    <select id="sequenceStep">
      <option value="">— Select step —</option>
      <option value="Day 2">Day 2</option>
      <option value="Day 3">Day 3</option>
      <option value="Day 4">Day 4</option>
      <option value="Week 2">Week 2</option>
      <option value="Week 3">Week 3</option>
      <option value="Week 4">Week 4</option>
      <option value="Month 2-6">Month 2-6</option>
      <option value="Month 6-12">Month 6-12</option>
      <option value="Year 2">Year 2</option>
      <option value="Proposal Sent">Proposal Sent</option>
      <option value="Check Back Later">Check Back Later</option>
    </select>

    <label for="nextFollowUpDate">Next follow-up date</label>
    <input type="date" id="nextFollowUpDate" />
    <div class="hint">When should the next follow-up be sent?</div>

    <button type="submit" id="submit-btn" onclick="submitForm()">Reset Sequence</button>
  </div>

  <div class="success" id="success-view">
    <div class="big-icon">✅</div>
    <h2>Sequence Reset</h2>
    <p id="success-message"></p>
    <div class="detail" id="success-detail"></div>
    <p style="margin-top:16px; font-size:13px; color:#aaa;">You can close this tab.</p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const clientName = params.get('ClientName') || '';
  const recordId = params.get('recordId') || '';

  document.getElementById('client-display').textContent = clientName;

  // Default next follow-up date to tomorrow
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('nextFollowUpDate').value = tomorrow.toISOString().split('T')[0];

  async function submitForm() {
    const sequenceStep = document.getElementById('sequenceStep').value;
    const nextFollowUpDate = document.getElementById('nextFollowUpDate').value;

    let valid = true;
    if (!sequenceStep) {
      document.getElementById('sequenceStep').classList.add('error');
      valid = false;
    } else {
      document.getElementById('sequenceStep').classList.remove('error');
    }
    if (!nextFollowUpDate) {
      document.getElementById('nextFollowUpDate').classList.add('error');
      valid = false;
    } else {
      document.getElementById('nextFollowUpDate').classList.remove('error');
    }
    if (!valid) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';

    try {
      await fetch('https://vannuysawning.app.n8n.cloud/webhook/reset-sequence', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientName, recordId, sequenceStep, nextFollowUpDate })
      });

      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
      document.getElementById('success-message').textContent =
        `The follow-up sequence for ${clientName} has been reset.`;
      document.getElementById('success-detail').textContent =
        `Restarting from: ${sequenceStep} · Next follow-up: ${nextFollowUpDate}`;
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Reset Sequence';
      alert('Something went wrong. Please try again.');
    }
  }
</script>
</body>
</html>
